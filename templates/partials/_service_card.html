{% load service_content %}
<article class="service-card">
    <a href="{% url 'services:service_detail' service.slug %}"></a>
        <div class="card-content">
            <h3>{{ service.name }}</h3>
            {% service_microcopy service as service_copy %}
            <p>{{ service_copy }}</p>
            <div class="arrow">&#8599;</div>
        </div>
    </a>
</article>
