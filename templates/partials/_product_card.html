{% load product_content %}

<a href="{{ product.url }}" class="service-card product-mini-card premium-card js-card">
    <span class="card-kicker">{{ product.category_name }}</span>
    <span class="card-title">{{ product.name }}</span>
    <span class="card-copy">
        {% if product.summary %}
            {{ product.summary }}
        {% else %}
            {% product_microcopy product %}
        {% endif %}
    </span>
    <span class="card-action" aria-hidden="true">Explore material</span>
</a>
