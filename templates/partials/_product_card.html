{% load product_content %}
<article class="service-card">
    <a href="{{ product.get_absolute_url }}" class="service-card-link">
        <div class="card-content">
            <h3>{{ product.name }}</h3>
            <p>{% product_microcopy product %}</p>
            <div class="arrow">&#8599;</div>
        </div>
    </a>
</article>
