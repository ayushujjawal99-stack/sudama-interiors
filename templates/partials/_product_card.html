{% load product_content %}

<a href="{{ product.url }}" class="service-card product-mini-card js-card">

    <!-- Kicker -->
    <span class="card-kicker">
        {{ product.category_name }}
    </span>

    <!-- Title -->
    <h3 class="card-title">
        {{ product.name }}
    </h3>

    <!-- Copy -->
    <p class="card-copy">
        {% if product.summary %}
            {{ product.summary }}
        {% else %}
            {% product_microcopy product %}
        {% endif %}
    </p>

    <!-- Action -->
    <span class="card-action">
        Explore Material
    </span>

</a>
