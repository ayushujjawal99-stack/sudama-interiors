{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Sudama Interiors | Luxury Interior Studio{% endblock %}</title>
  <meta name="description" content="{% block meta_description %}Cinematic, premium interior design and execution by Sudama Interiors.{% endblock %}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
  <div class="ambient-layer" aria-hidden="true"></div>
  <div class="cursor-light" aria-hidden="true"></div>
  {% include "partials/navbar.html" %}
  <main id="main-content">
    {% block content %}{% endblock %}
  </main>
  {% include "partials/footer.html" %}
  <script src="{% static 'js/premium.js' %}" defer></script>
</body>
</html>
