{% load service_content %}
<article class="service-card">
    <a href="{{ service.get_absolute_url }}" class="service-card-link">
        <div class="card-content">
            <h3>{{ service.name }}</h3>
            {% service_microcopy service as service_copy %}
            <p>{{ service_copy }}</p>
            <div class="arrow">&#8599;</div>
        </div>
    </a>
</article>
