{% load static %}

<article class="product-category-card js-card">
    <a href="{{ category.url }}">

        <!-- Media -->
        <div class="product-media">
            {% if category.image %}
                <img src="{% static category.image %}" alt="{{ category.name }}" loading="lazy">
            {% else %}
                <div class="product-media-placeholder">
                    {{ category.name }}
                </div>
            {% endif %}
        </div>

        <!-- Body -->
        <div class="product-card-body">

            <span class="card-kicker">
                Material category
            </span>

            <h3 class="product-card-title">
                {{ category.name }}
            </h3>

            <p class="card-copy">
                {{ category.summary }}
            </p>

            <div class="product-tags">
                {% for product in category.products|slice:":3" %}
                    <span>{{ product.name }}</span>
                {% empty %}
                    <span>Consultation</span>
                    <span>Selection</span>
                    <span>Installation</span>
                {% endfor %}
            </div>

            <span class="card-action">
                Explore Category
            </span>

        </div>

    </a>
</article>
