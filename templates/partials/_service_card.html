<a href="{{ service.url }}" class="service-card premium-card js-card">
    <span class="card-kicker">{{ service.category_name }}</span>
    <span class="card-title">{{ service.name }}</span>
    <span class="card-copy">{{ service.summary|default:"Thoughtfully planned service with reliable execution and refined finishing." }}</span>
    <span class="card-action" aria-hidden="true">View service</span>
</a>
