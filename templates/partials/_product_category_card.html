{% load static %}

<article class="product-category-card js-card">
    <a href="{{ category.url }}">
        <span class="product-media">
            {% if category.image %}
                <img src="{% static category.image %}" alt="{{ category.name }}" loading="lazy">
            {% else %}
                <span class="product-media-placeholder">{{ category.name }}</span>
            {% endif %}
        </span>

        <span class="product-card-body">
            <span class="card-kicker">Material category</span>
            <span class="product-card-title">{{ category.name }}</span>
            <span class="card-copy">{{ category.summary }}</span>
            <span class="product-tags">
                {% for product in category.products|slice:":3" %}
                    <span>{{ product.name }}</span>
                {% empty %}
                    <span>Consultation</span>
                    <span>Selection</span>
                    <span>Installation</span>
                {% endfor %}
            </span>
            <span class="card-action" aria-hidden="true">Explore category</span>
        </span>
    </a>
</article>
